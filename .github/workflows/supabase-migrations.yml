name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without applying migrations"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      seed_test_data:
        description: "Reset and import deterministic test data after applying migrations"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

jobs:
  migrate:
    # Runs on push when this workflow is triggered (supabase/** changes).
    # Set repository variable SUPABASE_MIGRATIONS_ENABLED=false to disable.
    if: vars.SUPABASE_MIGRATIONS_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "::error::Missing SUPABASE_ACCESS_TOKEN secret" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "::error::Missing SUPABASE_DB_PASSWORD secret" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "::error::Missing SUPABASE_PROJECT_ID secret" && exit 1)

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link existing Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show pending migrations
        run: supabase db push --dry-run

      - name: Apply migrations
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        run: supabase db push --yes

      - name: Install PostgreSQL client
        if: (github.event_name == 'push' || github.event.inputs.seed_test_data == 'true') && (github.event_name == 'push' || github.event.inputs.dry_run == 'false')
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Reset and import mock table data
        if: (github.event_name == 'push' || github.event.inputs.seed_test_data == 'true') && (github.event_name == 'push' || github.event.inputs.dry_run == 'false')
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            psql "$SUPABASE_DB_URL" \
              --set=ON_ERROR_STOP=1 \
              --file=supabase/seed-test-environment.sql
          else
            psql \
              "host=db.${SUPABASE_PROJECT_ID}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
              --set=ON_ERROR_STOP=1 \
              --file=supabase/seed-test-environment.sql
          fi
