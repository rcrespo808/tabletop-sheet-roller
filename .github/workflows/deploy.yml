name: Deploy (Supabase + App)

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run Supabase migrations"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      seed_test_data:
        description: "Reset and import deterministic test data"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_app:
        description: "Deploy app with Vercel CLI"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event_name == 'push' || github.event.inputs.deploy_app == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate migration secrets
        id: migration_secrets
        if: github.event_name == 'push' || github.event.inputs.run_migrations == 'true' || github.event.inputs.seed_test_data == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          missing=0
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "::warning::Missing secret: SUPABASE_ACCESS_TOKEN"; missing=1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "::warning::Missing secret: SUPABASE_DB_PASSWORD"; missing=1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "::warning::Missing secret: SUPABASE_PROJECT_ID"; missing=1; }

          if [ "$missing" -eq 1 ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "Missing one or more Supabase migration secrets. Skipping migration steps."
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: (github.event_name == 'push' || github.event.inputs.run_migrations == 'true') && steps.migration_secrets.outputs.can_run == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link existing Supabase project
        if: (github.event_name == 'push' || github.event.inputs.run_migrations == 'true') && steps.migration_secrets.outputs.can_run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply Supabase migrations
        if: (github.event_name == 'push' || github.event.inputs.run_migrations == 'true') && steps.migration_secrets.outputs.can_run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set +e
          supabase db push --dry-run 2>&1 | tee /tmp/supabase-db-push-dry-run.log
          dry_run_status=${PIPESTATUS[0]}
          set -e

          if [ "$dry_run_status" -ne 0 ]; then
            if grep -q "Remote migration versions not found in local migrations directory" /tmp/supabase-db-push-dry-run.log; then
              echo "::warning::Remote Supabase migration history contains versions missing locally. Skipping migrations so app deploy can continue. Run supabase migration repair/db pull to reconcile history."
              exit 0
            fi

            exit "$dry_run_status"
          fi

          supabase db push --yes

      - name: Sync Supabase auth redirect URLs
        if: (github.event_name == 'push' || github.event.inputs.run_migrations == 'true') && steps.migration_secrets.outputs.can_run == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: bash scripts/sync-supabase-auth-config.sh

      - name: Install PostgreSQL client
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.seed_test_data == 'true' && steps.migration_secrets.outputs.can_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Reset and import mock table data
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.seed_test_data == 'true' && steps.migration_secrets.outputs.can_run == 'true'
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            psql "$SUPABASE_DB_URL" \
              --set=ON_ERROR_STOP=1 \
              --file=supabase/seed-test-environment.sql
          else
            psql \
              "host=db.${SUPABASE_PROJECT_ID}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" \
              --set=ON_ERROR_STOP=1 \
              --file=supabase/seed-test-environment.sql
          fi

      - name: Validate app deployment secrets
        id: app_secrets
        if: github.event_name == 'push' || github.event.inputs.deploy_app == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          missing=0
          test -n "$VERCEL_TOKEN" || { echo "::warning::Missing secret: VERCEL_TOKEN"; missing=1; }
          test -n "$VERCEL_ORG_ID" || { echo "::warning::Missing secret: VERCEL_ORG_ID"; missing=1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "::warning::Missing secret: VERCEL_PROJECT_ID"; missing=1; }
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || { echo "::warning::Missing secret: NEXT_PUBLIC_SUPABASE_URL"; missing=1; }
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" || { echo "::warning::Missing secret: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"; missing=1; }
          test -n "$NEXT_PUBLIC_SITE_URL" || { echo "::warning::Missing secret: NEXT_PUBLIC_SITE_URL"; missing=1; }

          if [ "$missing" -eq 1 ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            echo "Missing one or more app deployment secrets. Skipping Vercel deployment steps."
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: (github.event_name == 'push' || github.event.inputs.deploy_app == 'true') && steps.app_secrets.outputs.can_run == 'true'
        run: npm ci

      - name: Deploy app to Vercel
        if: (github.event_name == 'push' || github.event.inputs.deploy_app == 'true') && steps.app_secrets.outputs.can_run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          npm i -g vercel@54.5.1
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
